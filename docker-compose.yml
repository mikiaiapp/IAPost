version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iapost-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./iapost.db}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32chars}
      - CARTERO_URL=${CARTERO_URL:-http://192.168.1.2:3001/send}
      - CARTERO_KEY=${CARTERO_KEY:-your-cartero-secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-fernet-key-here}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - SCHEDULER_HOUR=${SCHEDULER_HOUR:-6}
      - SCHEDULER_MINUTE=${SCHEDULER_MINUTE:-30}
      - TZ=Europe/Madrid
    volumes:
      - /volume1/docker/iapost/data:/app/data
      - /volume1/docker/iapost/logs:/app/logs
    ports:
      - "8008:8000"
    networks:
      - iapost_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iapost-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3333:80"
    networks:
      - iapost_network
    depends_on:
      backend:
        condition: service_healthy

networks:
  iapost_network:
    driver: bridge
