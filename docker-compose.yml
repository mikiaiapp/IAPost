version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iapost-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/data/iapost.db}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32chars}
      - CARTERO_URL=${CARTERO_URL:-http://192.168.1.2:3001/send}
      - CARTERO_KEY=${CARTERO_KEY:-your-cartero-secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-fernet-key-here}
      - CORS_ORIGINS=*
      - SCHEDULER_HOUR=${SCHEDULER_HOUR:-6}
      - SCHEDULER_MINUTE=${SCHEDULER_MINUTE:-30}
      - TZ=Europe/Madrid
    volumes:
      - /volume1/docker/iapost/data:/app/data
      - /volume1/docker/iapost/logs:/app/logs
    ports:
      - "8008:8000"
    networks:
      - iapost_network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iapost-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3333:80"
    networks:
      - iapost_network
    depends_on:
      - backend

networks:
  iapost_network:
    driver: bridge
